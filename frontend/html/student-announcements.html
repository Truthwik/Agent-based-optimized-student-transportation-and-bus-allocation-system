<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.3">
    <style>
        .ann-card {
            border-left: 4px solid var(--primary-accent);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .ann-card:hover { transform: translateY(-2px); }
        .ann-card.global { border-left-color: #ef4444; }
        .ann-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 12px;
            display: flex;
            gap: 16px;
        }
        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-bus { background: rgba(59,130,246,0.1); color: var(--accent-blue); }
        .badge-admin { background: rgba(239,68,68,0.1); color: #ef4444; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <img class="logo-img" src="/static/img/logo.png" alt="Vishnu Logo" width="36" height="36" style="border-radius: 8px;">
                    BVRIT Smart Bus
                </div>
                <ul class="navbar-links">
                    <li><a href="/static/html/dashboard.html">Dashboard</a></li>
                    <li><a href="/static/html/student-announcements.html" class="active">Announcements</a></li>
                    <li><a href="/static/html/select-stop.html">Select Stop</a></li>
                    <li><a href="/static/html/view-allocation.html">My Allocation</a></li>
                    <li><a href="/static/html/bus-pass.html">Bus Pass</a></li>
                    <li><a href="/static/html/tracking.html">📍 Track My Bus</a></li>
                    <li><a href="#" class="btn-logout" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="container">
                <div class="page-header slide-up">
                    <h1>📢 Announcements</h1>
                    <p class="subtitle">Latest updates from your bus coordinator and campus admin</p>
                </div>

                <div id="annContainer" class="slide-up" style="animation-delay: 0.2s;">
                    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">Loading alerts...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/static/html/login.html';

        async function loadAnnouncements() {
            try {
                const res = await fetch('/students/announcements', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const anns = await res.json();
                
                const container = document.getElementById('annContainer');
                if (anns.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card" style="text-align:center; padding:60px;">
                            <div style="font-size:3rem; margin-bottom:16px;">📭</div>
                            <h3>All caught up!</h3>
                            <p style="color:var(--text-secondary)">No active announcements at the moment.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = anns.map(a => `
                    <div class="glass-card ann-card ${a.bus_id === null ? 'global' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
                            <h3 style="margin:0">${a.title}</h3>
                            <span class="badge ${a.bus_id === null ? 'badge-admin' : 'badge-bus'}">
                                ${a.bus_id === null ? 'Campus Alert' : 'Bus Update'}
                            </span>
                        </div>
                        <p style="margin:0; line-height:1.6; color:var(--text-primary)">${a.message}</p>
                        <div class="ann-meta">
                            <span>⏳ Valid until: ${new Date(a.expires_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('annContainer').innerHTML = '<div class="alert alert-error show">Failed to load announcements. Please try again.</div>';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/static/html/login.html';
        }

        loadAnnouncements();
    </script>
</body>
</html>
