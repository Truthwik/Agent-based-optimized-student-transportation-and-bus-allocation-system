<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=logo-theme-1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; }
        .map-container { position: relative; height: calc(100vh - 72px); width: 100%; margin-top: 72px; }
        #map { height: 100%; width: 100%; }

        /* Premium Glass Panel (Matches Coordinator exactly) */
        .glass-panel {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; z-index: 1000;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 24px; box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5); color: white;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .status-badge {
            padding: 6px 12px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-badge.live { background: rgba(34,197,94,0.2); color: #4ade80; }
        .status-badge.parked { background: rgba(255,255,255,0.1); color: #94a3b8; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; }
        .stat-item { text-align: left; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 1.15rem; font-weight: 700; color: #fff; }
        
        .nav-back { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .nav-back:hover { opacity: 0.8; }

        #geofenceAlert {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1001; background: #f59e0b; color: white; padding: 12px 24px;
            border-radius: 12px; font-weight: 600; box-shadow: 0 4px 15px rgba(245,158,11,0.4);
            display: none; animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <nav class="navbar" style="position: fixed; top: 0; width: 100%; z-index: 2000;">
        <div class="container">
            <div class="navbar-brand">
                <a href="/static/html/dashboard.html" class="nav-back">🔙 BVRIT Smart Bus</a>
            </div>
            <ul class="navbar-links">
                <li><a href="/static/html/dashboard.html">Dashboard</a></li>
                <li><a href="/static/html/tracking.html" class="active">Live Tracking</a></li>
                <li><a href="#" class="btn-logout" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div id="geofenceAlert">🚌 Your bus is nearby! Please be ready at your stop.</div>

    <div class="map-container">
        <div id="map"></div>
        
        <!-- Premium Floating Panel -->
        <div class="glass-panel slide-up">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px">
                <div>
                    <h3 style="margin:0; font-size: 1.3rem;" id="panelBusName">Bus #--</h3>
                    <div style="font-size:0.85rem; color: #94a3b8; margin-top:4px" id="panelRouteName">Finding your route...</div>
                </div>
                <div id="statusBadge" class="status-badge parked">Bus not started</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">🚀 Live Speed</div>
                    <div class="stat-value" id="busSpeed">-- km/h</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏱ ETA to Study</div>
                    <div class="stat-value" id="etaValue" style="color:#4ade80;">--</div>
                </div>
                <div style="grid-column: span 2; display: flex; justify-content: space-between; margin-top: 6px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);">
                    <span style="color: #64748b; font-size:0.75rem;" id="lastPingText">Waiting for driver signal...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'student') window.location.href = '/static/html/login.html';

        let map, busMarker, stopMarker;
        let busId = null;
        let studentStop = null;
        let alertSent = false;
        let lastEtaUpdate = 0;
        let mapInitialized = false;

        const busIcon = L.divIcon({
            html: '<div style="font-size:32px;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.4))">🚌</div>',
            className: '', iconSize: [40, 40], iconAnchor: [20, 20]
        });
        const stopIcon = L.divIcon({
            html: '<div style="font-size:28px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))">📍</div>',
            className: '', iconSize: [30, 36], iconAnchor: [15, 36]
        });
        const collegeIcon = L.divIcon({
            html: '<div style="font-size:32px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))">🏢</div>',
            className: '', iconSize: [36, 36], iconAnchor: [18, 18]
        });

        async function init() {
            // IMMEDIATE MAP LOAD - Prevents blank screen
            initMap();

            try {
                // Get student profile → bus ID
                const meRes = await fetch('/students/me', { headers: { 'Authorization': 'Bearer ' + token } });
                const me = await meRes.json();
                
                if (!me.allocated_bus_id) {
                    document.getElementById('statusBadge').textContent = 'No Bus Allocated';
                    document.getElementById('panelRouteName').textContent = 'Please contact admin for allocation.';
                    return;
                }

                busId = me.allocated_bus_id;
                document.getElementById('panelBusName').textContent = `Bus ${me.allocated_bus_number || busId}`;

                // Get route + student stop
                try {
                    const routeRes = await fetch('/students/route', { headers: { 'Authorization': 'Bearer ' + token } });
                    const routeData = await routeRes.json();
                    if (routeData && routeData.stops) {
                        document.getElementById('panelRouteName').textContent = routeData.route_name || 'Assigned Route';
                        
                        const allocRes = await fetch('/students/allocation', { headers: { 'Authorization': 'Bearer ' + token } });
                        if (allocRes.ok) {
                            const alloc = await allocRes.json();
                            if (alloc && alloc.stop_name) {
                                studentStop = routeData.stops.find(s => s.stop_name === alloc.stop_name);
                                if (studentStop && map) {
                                    stopMarker = L.marker([studentStop.latitude, studentStop.longitude], { icon: stopIcon })
                                        .addTo(map).bindPopup(`<b>Your Stop: ${studentStop.stop_name}</b>`);
                                }
                            }
                        }
                    }
                } catch(_) {}

                // Initial poll and set interval
                pollBusStatus();
                setInterval(pollBusStatus, 8000);

            } catch (err) {
                console.error('Init error:', err);
            }
        }

        function initMap(lat, lng) {
            if (mapInitialized) return;
            mapInitialized = true;
            
            // Default center on BVRIT Campus
            const defaultLat = 17.7252;
            const defaultLng = 78.2571;
            
            map = L.map('map', { zoomControl: false }).setView([lat || defaultLat, lng || defaultLng], 14);
            L.control.zoom({ position: 'topright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Always show College Building
            L.marker([defaultLat, defaultLng], { icon: collegeIcon })
                .addTo(map).bindPopup('<b>BVRIT Campus</b>');
        }

        async function pollBusStatus() {
            if (!busId) return;
            try {
                const res = await fetch(`/tracking/bus/${busId}?token=${token}`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');

                if (data.is_active && data.latitude) {
                    badge.textContent = '🟢 LIVE';
                    badge.className = 'status-badge live';
                    
                    const pos = [data.latitude, data.longitude];
                    if (!busMarker) {
                        busMarker = L.marker(pos, { icon: busIcon }).addTo(map)
                            .bindPopup(`<b>Bus ${data.bus_number || busId}</b>`);
                    } else {
                        busMarker.setLatLng(pos).setOpacity(1);
                    }
                    
                    if (!map.getBounds().contains(pos)) map.panTo(pos);

                    document.getElementById('busSpeed').textContent = (data.speed_kmh || 0).toFixed(1) + ' km/h';
                    document.getElementById('lastPingText').textContent = '📡 Last ping: ' + (data.updated_at || 'Just now');

                    // Geofence & ETA
                    if (studentStop) {
                        const dist = haversine(data.latitude, data.longitude, studentStop.latitude, studentStop.longitude);
                        if (dist < 0.5 && !alertSent) {
                            document.getElementById('geofenceAlert').style.display = 'block';
                            alertSent = true;
                        }
                        if (Date.now() - lastEtaUpdate > 30000) fetchETA(data.latitude, data.longitude, studentStop.latitude, studentStop.longitude);
                    }
                } else {
                    badge.textContent = 'Bus not started';
                    badge.className = 'status-badge parked';
                    document.getElementById('busSpeed').textContent = '-- km/h';
                    document.getElementById('etaValue').textContent = '--';
                    document.getElementById('lastPingText').textContent = 'Waiting for driver signal...';
                    if (busMarker) busMarker.setOpacity(0.5);
                }
            } catch(err) { console.error('Poll error:', err); }
        }

        async function fetchETA(busLat, busLng, stopLat, stopLng) {
            try {
                const url = `https://router.project-osrm.org/route/v1/driving/${busLng},${busLat};${stopLng},${stopLat}?overview=false`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.routes && data.routes[0]) {
                    const mins = Math.ceil(data.routes[0].duration / 60);
                    document.getElementById('etaValue').textContent = `~${mins} min`;
                    lastEtaUpdate = Date.now();
                }
            } catch(_) { document.getElementById('etaValue').textContent = '--'; }
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function logout() { localStorage.clear(); window.location.href = '/static/html/login.html'; }
        
        init();
    </script>
</body>
</html>
