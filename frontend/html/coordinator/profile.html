<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Coordinator Portal</title>
    <link rel="stylesheet" href="/static/css/style.css?v=logo-theme-1">
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <img class="logo-img" src="/static/img/logo.png" alt="Logo" width="32" height="32">
                    Coordinator Portal
                </div>
                <ul class="navbar-links">
                    <li><a href="/static/html/coordinator/dashboard.html">Dashboard</a></li>
                    <li><a href="/static/html/coordinator/students.html">Students</a></li>
                    <li><a href="/static/html/coordinator/tracking.html">Live Tracking</a></li>
                    <li><a href="/static/html/coordinator/route.html">Route</a></li>
                    <li><a href="/static/html/coordinator/daypass.html">Day Pass</a></li>
                    <li><a href="/static/html/coordinator/profile.html" class="active">Profile</a></li>
                    <li><a href="#" class="btn-logout" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="container" style="max-width: 600px;">
                <div class="page-header slide-up">
                    <h1>👤 My Profile</h1>
                    <p class="subtitle">View your details or change your password</p>
                </div>

                <div class="glass-card slide-up" style="animation-delay: 0.1s; margin-bottom: 24px;">
                    <h3>Coordinator Details</h3>
                    <div style="margin-top:20px; display:grid; gap:16px;">
                        <div>
                            <span style="color:var(--text-secondary); font-size:0.85rem">Full Name</span>
                            <div style="font-size:1.1rem; font-weight:600" id="pName">-</div>
                        </div>
                        <div>
                            <span style="color:var(--text-secondary); font-size:0.85rem">Employee ID</span>
                            <div style="font-size:1.1rem; font-weight:600" id="pEmp">-</div>
                        </div>
                        <div>
                            <span style="color:var(--text-secondary); font-size:0.85rem">Assigned Bus</span>
                            <div style="font-size:1.1rem; font-weight:600" id="pBus">-</div>
                        </div>
                        <div>
                            <span style="color:var(--text-secondary); font-size:0.85rem">Email Address</span>
                            <div style="font-size:1.1rem; font-weight:600" id="pEmail">-</div>
                        </div>
                        <div>
                            <span style="color:var(--text-secondary); font-size:0.85rem">Phone Number</span>
                            <div style="font-size:1.1rem; font-weight:600" id="pPhone">-</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card slide-up" style="animation-delay: 0.2s;">
                    <h3>🔑 Change Password</h3>
                    <div id="alert" class="alert" style="margin-top:16px;"></div>
                    
                    <div class="form-group" style="margin-top:16px;">
                        <label>Current Password</label>
                        <input type="password" id="oldPwd" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPwd" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPwd" class="form-control" required>
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="changePassword()">Update Password</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'coordinator') window.location.href = '/static/html/login.html';
        const headers = { 'Authorization': `Bearer ${token}` };

        async function init() {
            try {
                const res = await fetch('/coordinator/me', { headers });
                if (!res.ok) { if(res.status === 401) logout(); return; }
                const data = await res.json();
                
                document.getElementById('pName').textContent = data.coordinator.name;
                document.getElementById('pEmp').textContent = data.coordinator.employee_id;
                document.getElementById('pEmail').textContent = data.coordinator.email;
                document.getElementById('pPhone').textContent = data.coordinator.phone;
                document.getElementById('pBus').textContent = `Bus #${data.bus.bus_number}`;
            } catch (err) { console.error(err); }
        }

        async function changePassword() {
            const oldp = document.getElementById('oldPwd').value;
            const newp = document.getElementById('newPwd').value;
            const conf = document.getElementById('confirmPwd').value;
            const aler = document.getElementById('alert');

            if (!oldp || !newp || !conf) {
                aler.className = 'alert alert-error show'; aler.textContent = 'All fields required'; return;
            }
            if (newp !== conf) {
                aler.className = 'alert alert-error show'; aler.textContent = 'Passwords do not match'; return;
            }

            try {
                const res = await fetch('/auth/change-password', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_password: oldp, new_password: newp })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    aler.className = 'alert alert-error show'; aler.textContent = data.detail; return;
                }
                
                aler.className = 'alert alert-success show'; aler.textContent = 'Password updated successfully! Logging out...';
                setTimeout(logout, 2000);
            } catch (e) {
                aler.className = 'alert alert-error show'; aler.textContent = 'Error updating password';
            }
        }

        function logout() { localStorage.clear(); window.location.href = '/static/html/login.html'; }
        init();
    </script>
</body>
</html>
