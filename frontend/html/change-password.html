<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="../css/style.css?v=1.2">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-card auth-card fade-in">
            <div class="logo-icon-lg">🔐</div>
            <h1 id="page-title">Change Password</h1>
            <p id="page-subtitle" class="subtitle">Please update your account password</p>

            <div id="alert" class="alert"></div>

            <form id="changeForm">
                <div class="premium-input-group">
                    <label for="oldPassword">Current Password</label>
                    <input type="password" id="oldPassword" placeholder="Enter current password" required>
                    <button type="button" class="password-toggle" onclick="togglePass('oldPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="premium-input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <button type="button" class="password-toggle" onclick="togglePass('newPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="premium-input-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <button type="button" class="password-toggle" onclick="togglePass('confirmPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Update Password</button>
            </form>
            <a id="cancel-btn" href="dashboard.html" class="btn btn-secondary btn-block" style="margin-top: 12px; text-align: center; text-decoration: none; display: block;">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';
        
        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            btn.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
        }

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass !== confirm) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Passwords do not match';
                return;
            }

            try {
                const res = await fetch('/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({
                        old_password: document.getElementById('oldPassword').value,
                        new_password: newPass
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert.className = 'alert alert-error show';
                    alert.textContent = data.detail || 'Failed to change password';
                    return;
                }

                localStorage.setItem('password_changed', 'true');
                alert.className = 'alert alert-success show';
                alert.textContent = 'Password changed! Redirecting...';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Connection error';
            }
        });
    </script>
</body>
</html>
