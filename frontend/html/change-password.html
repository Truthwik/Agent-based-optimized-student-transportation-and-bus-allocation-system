<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-card auth-card fade-in">
            <div class="logo-icon-lg">🔐</div>
            <h1>Change Password</h1>
            <p class="subtitle">Please set a new password for your first login</p>

            <div id="alert" class="alert"></div>

            <form id="changeForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="oldPassword" class="form-control" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/static/html/login.html';

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass !== confirm) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Passwords do not match';
                return;
            }

            try {
                const res = await fetch(`/auth/change-password?token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        old_password: document.getElementById('oldPassword').value,
                        new_password: newPass
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert.className = 'alert alert-error show';
                    alert.textContent = data.detail || 'Failed to change password';
                    return;
                }

                alert.className = 'alert alert-success show';
                alert.textContent = 'Password changed! Redirecting...';
                setTimeout(() => { window.location.href = '/static/html/dashboard.html'; }, 1500);
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Connection error';
            }
        });
    </script>
</body>
</html>
