<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Login | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="../css/style.css?v=1.2">
</head>
<body>
    <div class="page-wrapper">
        <div class="auth-wrapper">
            <div class="glass-card auth-card slide-up">
                <div class="logo-icon-lg">
                    <img src="../img/logo.png" alt="Vishnu Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px;">
                </div>
                <h1>Driver Login</h1>
                <p class="subtitle">Enter Bus Number and Registered Phone</p>
                
                <div id="alert" class="alert"></div>

                <form id="driverLoginForm">
                    <div class="premium-input-group">
                        <label for="busNumber">Bus Number</label>
                        <input type="text" id="busNumber" placeholder="e.g. 50" required>
                    </div>
                    
                    <div class="premium-input-group">
                        <label for="phone">Phone Number</label>
                        <input type="password" id="phone" placeholder="Enter registered phone" required>
                        <button type="button" class="password-toggle" id="togglePhone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In as Driver</button>
                </form>
                
                <div style="margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
                    Student? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol !== 'file:' && window.location.origin ? window.location.origin : 'http://127.0.0.1:8000';

        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

        document.getElementById('togglePhone')?.addEventListener('click', function() {
            const phone = document.getElementById('phone');
            const type = phone.getAttribute('type') === 'password' ? 'text' : 'password';
            phone.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
        });

        document.getElementById('driverLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            alert.className = 'alert';

            const username = document.getElementById('busNumber').value.trim();
            const password = document.getElementById('phone').value.trim();

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert.className = 'alert alert-error show';
                    alert.textContent = data.detail || 'Login failed';
                    return;
                }

                if (data.role !== 'driver') {
                    alert.className = 'alert alert-error show';
                    alert.textContent = 'This page is only for drivers. Please use the student login page.';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', username);
                if (data.bus_id) localStorage.setItem('bus_id', data.bus_id);

                window.location.href = 'driver.html';
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Connection error. Make sure the server and database are running.';
            }
        });
    </script>
</body>
</html>
