<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="auth-wrapper">
            <div class="glass-card auth-card slide-up">
                <div class="logo-icon-lg">🚌</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Please enter your credentials to login</p>
                
                <div id="alert" class="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Student ID / Roll Number</label>
                        <input type="text" id="username" class="form-control" placeholder="e.g. 21WH1A0501" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
                
                <div style="margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
                    Employee? <a href="/static/html/admin-login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            alert.className = 'alert';
            alert.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert.className = 'alert alert-error show';
                    alert.textContent = data.detail || 'Login failed';
                    return;
                }

                if (data.role === 'admin') {
                    alert.className = 'alert alert-error show';
                    alert.textContent = 'Please use the admin login page';
                    return;
                }

                // Store credentials
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);

                if (!data.password_changed) {
                    window.location.href = '/static/html/change-password.html';
                } else {
                    window.location.href = '/static/html/dashboard.html';
                }
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Connection error. Please try again.';
            }
        });
    </script>
</body>
</html>
