<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.1">
</head>
<body>
    <div class="page-wrapper">
        <div class="auth-wrapper">
            <div class="glass-card auth-card slide-up">
                <div class="logo-icon-lg">
                    <img src="/static/img/logo.png" alt="Vishnu Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px;">
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Please enter your credentials to login</p>
                
                <div id="alert" class="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Student ID / Roll Number</label>
                        <input type="text" id="username" class="form-control" placeholder="e.g. 21WH1A0501" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
                
                <div style="margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
                    Employee? <a href="/static/html/admin-login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Same host as this page when served by FastAPI; fallback if HTML opened from disk
        const API_BASE =
            window.location.protocol !== 'file:' && window.location.origin
                ? window.location.origin
                : 'http://127.0.0.1:8000';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            alert.className = 'alert';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            let res;
            try {
                res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent =
                    'Cannot reach the server. Start MySQL, then run: python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000';
                return;
            }

            const raw = await res.text();
            let data;
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch (err) {
                alert.className = 'alert alert-error show';
                const hint = raw.replace(/\s+/g, ' ').trim().slice(0, 180);
                alert.textContent =
                    'Non-JSON response (HTTP ' +
                    res.status +
                    '). Often: MySQL off, wrong port, or another app on :8000. ' +
                    (hint ? 'Preview: ' + hint : '');
                return;
            }

            if (!res.ok) {
                alert.className = 'alert alert-error show';
                const msg = typeof data.detail === 'string' ? data.detail : (data.detail && JSON.stringify(data.detail)) || 'Login failed';
                alert.textContent = msg;
                return;
            }

            if (data.role === 'admin') {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Please use the admin login page';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);

            if (!data.password_changed) {
                window.location.href = '/static/html/change-password.html';
            } else {
                window.location.href = '/static/html/dashboard.html';
            }
        });
    </script>
</body>
</html>
