<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | BVRIT Smart Bus</title>
    <link rel="stylesheet" href="../css/style.css?v=1.2">
</head>
<body>
    <div class="page-wrapper">
        <div class="auth-wrapper">
            <div class="glass-card auth-card slide-up">
                <div class="logo-icon-lg">
                    <img src="../img/logo.png" alt="Vishnu Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px;">
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Please enter your credentials to login</p>
                
                <div id="alert" class="alert"></div>

                <form id="loginForm">
                    <div class="premium-input-group">
                        <label for="username">Student ID / Roll Number</label>
                        <input type="text" id="username" placeholder="e.g. 21WH1A0501" required>
                    </div>
                    
                    <div class="premium-input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
                
                <div style="margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
                    Employee? <a href="admin-login.html">Login here</a>
                </div>
                <div style="margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary);">
                    Bus Driver? <a href="driver-login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Same host as this page when served by FastAPI; fallback if HTML opened from disk
        const API_BASE =
            window.location.protocol !== 'file:' && window.location.origin
                ? window.location.origin
                : 'http://127.0.0.1:8000';

        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

        document.getElementById('togglePassword')?.addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('alert');
            alert.className = 'alert';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            let res;
            try {
                res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
            } catch (err) {
                alert.className = 'alert alert-error show';
                alert.textContent =
                    'Cannot reach the server. Start MySQL, then run: python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000';
                return;
            }

            const raw = await res.text();
            let data;
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch (err) {
                alert.className = 'alert alert-error show';
                const hint = raw.replace(/\s+/g, ' ').trim().slice(0, 180);
                alert.textContent =
                    'Non-JSON response (HTTP ' +
                    res.status +
                    '). Often: MySQL off, wrong port, or another app on :8000. ' +
                    (hint ? 'Preview: ' + hint : '');
                return;
            }

            if (!res.ok) {
                alert.className = 'alert alert-error show';
                const msg = typeof data.detail === 'string' ? data.detail : (data.detail && JSON.stringify(data.detail)) || 'Login failed';
                alert.textContent = msg;
                return;
            }

            if (data.role === 'admin') {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Please use the admin login page';
                return;
            }
            if (data.role === 'coordinator') {
                alert.className = 'alert alert-error show';
                alert.textContent = 'Please use the employee login page';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
            if (data.bus_id) localStorage.setItem('bus_id', data.bus_id);

            if (data.role === 'driver') {
                window.location.href = 'driver.html';
                return;
            }

            if (!data.password_changed) {
                window.location.href = 'change-password.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
